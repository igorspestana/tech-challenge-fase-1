services:
  jupyter:
    build: .
    ports:
      - "8888:8888"
    command:
      - uv
      - run
      - jupyter
      - lab
      - --ip=0.0.0.0
      - --port=8888
      - --no-browser
      - --allow-root
    volumes:
      - ./notebooks:/app/notebooks
      - ./data:/app/data
      - ./results:/app/results
      - ./src:/app/src
